<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zicheng | Portfolio</title>
    <style>
        /* Global Styles */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f7f7f7;
            color: #111111;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Top Navigation Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 4rem;
            background-color: #f7f7f7;
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .dot {
            width: 16px;
            height: 16px;
            background-color: #7bc4d4;
            border-radius: 50%;
        }
        .logo-name {
            font-weight: 700;
            font-size: 1.2rem;
        }
        .logo-title {
            color: #666;
            font-size: 0.9rem;
            margin-left: 5px;
        }
        nav a {
            text-decoration: none;
            color: #111;
            font-size: 0.9rem;
            margin-left: 20px;
        }

        /* Main Profile Layout Container */
        .profile-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4rem;
            max-width: 1100px;
            margin: 6rem auto;
            padding: 0 2rem;
        }

        /* Profile Photo Frame customized for your image */
        .photo-frame {
            width: 320px;
            height: 320px;
            border-radius: 50%;
            overflow: hidden;
            flex-shrink: 0;
        }
        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Profile Text Bio Area */
        .bio-area {
            max-width: 500px;
        }
        .bio-area h1 {
            font-size: 3rem;
            margin: 0 0 0.5rem 0;
            font-weight: 700;
        }
        .bio-area h3 {
            font-size: 1.1rem;
            margin: 0 0 1rem 0;
            font-weight: 600;
        }
        .bio-area p {
            font-size: 0.95rem;
            line-height: 1.6;
            color: #333;
            margin-bottom: 2rem;
        }

        /* Circle Buttons Grid Layout */
        .circle-menu {
            display: flex;
            gap: 15px;
        }
        .circle-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            text-decoration: none;
            color: #111;
            font-weight: 500;
            font-size: 0.9rem;
            border: 1px solid rgba(0,0,0,0.15);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .circle-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
